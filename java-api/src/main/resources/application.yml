server:
  port: ${SERVER_PORT:8080}

agent:
  base-url: ${AGENT_BASE_URL:http://localhost:8000}

security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars!!}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}   # 1 hour

spring:
  main:
    web-application-type: reactive
  jackson:
    serialization:
      indent-output: true