version: "3.9"

# ---------------------------------------------------------------------------
# BASE COMPOSE – no Ollama service defined here.
# Ollama is added via override files depending on your platform:
#
#   Windows + NVIDIA GPU   →  docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
#   Mac     + Docker CPU   →  docker compose -f docker-compose.yml -f docker-compose.cpu.yml up --build
#   Mac     + Local Ollama →  docker compose up --build
#                              (requires Ollama running natively: `ollama serve`)
#
# Or use the Makefile shortcuts: make up-gpu | make up-mac-docker | make up-mac-local
# ---------------------------------------------------------------------------

services:
  python-agent:
    container_name: engineering-copilot-v6-python-agent
    build:
      context: ./python-agent
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: engineering_copilot
      # When running without an Ollama container (Mac local mode), this default
      # points to the host machine where `ollama serve` is running.
      # Override files (docker-compose.gpu.yml / docker-compose.cpu.yml) set
      # this to http://ollama:11434 when Ollama runs inside Docker instead.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      GENERAL_MODEL: ${GENERAL_MODEL:-llama3.1:8b}
      CODE_MODEL: ${CODE_MODEL:-qwen2.5-coder:7b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-false}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-stdio}
      MCP_SERVER_COMMAND: ${MCP_SERVER_COMMAND:-}
      MCP_SERVER_ARGS: ${MCP_SERVER_ARGS:-}
      MCP_WEB_SEARCH_TOOL: ${MCP_WEB_SEARCH_TOOL:-web_search}
      AGENT_PORT: 8000
    depends_on:
      - mongo
    # host.docker.internal resolves automatically on Docker Desktop (Mac/Windows).
    # The extra_hosts line below makes it work on Linux hosts as well.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  api:
    container_name: engineering-copilot-v6-api
    build:
      context: ./java-api
    environment:
      AGENT_BASE_URL: http://python-agent:8000
      SERVER_PORT: 8080
    depends_on:
      python-agent:
        condition: service_healthy
    ports:
      - "8080:8080"

  mongo:
    container_name: engineering-copilot-v6-mongo
    image: mongo:7
    ports:
      - "27017:27017"

  streamlit-ui:
    build: ./streamlit-ui
    container_name: engineering-copilot-v6-streamlit-ui
    environment:
      API_BASE_URL: http://api:8080
    ports:
      - "8501:8501"
    depends_on:
      - api